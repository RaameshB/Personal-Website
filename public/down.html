<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            /* slate-950 */
            color: #f8fafc;
            /* slate-50 */
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Beautiful Ambient Glows -->
    <div class="absolute top-0 right-1/4 w-96 h-96 bg-red-600/10 rounded-full blur-[128px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 left-1/4 w-72 h-72 bg-indigo-600/15 rounded-full blur-[96px] pointer-events-none">
    </div>

    <div
        class="text-center z-10 px-6 backdrop-blur-md bg-slate-900/40 border border-slate-800/60 py-16 px-10 rounded-3xl shadow-2xl animate-in fade-in slide-in-from-bottom-8 duration-700 max-w-3xl w-full mx-4">

        <svg class="w-20 h-20 text-indigo-400 mx-auto mb-8" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>

        <h1
            class="text-5xl md:text-6xl font-extrabold tracking-tight mb-6 bg-gradient-to-r from-red-400 via-rose-300 to-indigo-400 bg-clip-text text-transparent drop-shadow-sm">
            My Site is down :(
        </h1>

        <p class="text-xl md:text-2xl text-slate-400 mb-10 font-light max-w-2xl mx-auto leading-relaxed">
            I'm currently performing some critical maintenance or upgrading my servers. Everything will be back online
            shortly!
        </p>

        <a href="/"
            class="inline-flex items-center justify-center bg-transparent border border-indigo-600/50 text-indigo-300 hover:bg-indigo-600 hover:text-white hover:shadow-[0_0_20px_rgba(99,102,241,0.4)] px-8 py-4 text-lg font-semibold rounded-full transition-all group">
            <svg class="w-5 h-5 mr-3 group-hover:block transition-transform" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            Check Again
        </a>
    </div>
</body>

</html>
